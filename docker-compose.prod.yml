services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: openai-agent-sdk:prod
    container_name: openai-agent-sdk
    env_file:
      - config/prod.env
    environment:
      ENVTYPE: prod
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health/ok"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
